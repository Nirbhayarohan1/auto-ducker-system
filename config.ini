[Audio]
mic_device_name = Default
sample_rate = 16000
frame_duration = 30
vad_aggressiveness = 3
microphone_energy_threshold = 0.003
speech_energy_multiplier = 1.5

[Ducking]
target_processes = spotify.exe, vlc.exe, chrome.exe
volume_reduce_level = 0.15
fade_duration_sec = 0.4
silence_timeout_sec = 3
exit_after_one_cycle = False
media_pause_cooldown_sec = 1

[DetectionSmoothing]
speech_confirm_frames = 5
silence_confirm_frames = 10
speech_confirm_frames_media_playing = 10

[MediaControl]
media_app_titles = Spotify,YouTube
use_media_keys_fallback = True

